<!-- ============================================================
     HOHO 3D 輪播區塊 — 自包含、命名空間化 (.hoho-carousel)
     可整段貼進 ShopLine 後台「自訂 HTML」區塊。
     可調整項集中在下方 .hoho-carousel 的 CSS 變數，以及
     <script> 頂端的 CONFIG 物件。
     ============================================================ -->
<div class="hoho-carousel" id="hoho-carousel-root">
    <style>
        /* ---- 可調整變數（改這裡即可，全部作用域限定於本組件） ---- */
        .hoho-carousel {
            /* 動畫 */
            --hc-transition-time: 600ms;
            --hc-bounce-duration: 400ms;
            --hc-bounce-peak-y: -400px;
            --hc-bounce-peak-z: 50px;
            --hc-bounce-peak-scale: 1.2;

            /* 版面 */
            --hc-max-width: 1200px;      /* 輪播/內容最大寬度 */
            --hc-aspect: 16 / 10;        /* 輪播區長寬比（依實際輪播圖比例調整） */
            --hc-perspective: 1200px;    /* 3D 透視深度 */
            --hc-img-max-width: clamp(90px, 38vw, 150px);  /* 單張輪播卡片上限寬；全斷點同比例，PC 不刻意放大。卡片直式 2:3(1208x1818)，高=寬x1.5 */
            --hc-navbar: 103px;          /* PC 上方 navbar 高度（用於把內容收在一屏內；依實際調整） */

            /* 背景圖（art-direction：桌機 / 手機分別換） */
            --hc-bg-desktop: url('https://res.cloudinary.com/lmbtctmx/image/upload/v1783397768/260701bg.png');
            --hc-bg-mobile: url('https://res.cloudinary.com/lmbtctmx/image/upload/v1783390923/260701bg-mobile.png'); /* 手機直式版（長寬對換） */

            display: block;
            width: 100%;
        }

        /* ---- 版面骨架 ---- */
        .hoho-carousel * {
            box-sizing: border-box;
        }

        .hoho-carousel .hc-main {
            width: 100%;
            max-width: 100vw;
            margin: 0;
            padding: 0 0 2vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow-x: hidden;               /* 防止背景/縮放造成水平卷動 */
            background-image: var(--hc-bg-desktop);
            background-size: cover;           /* 取代原本 200%，避免溢出 */
            background-position: center center;
            background-repeat: no-repeat;

        }

        .hoho-carousel .hc-carousel-wrapper {
            position: relative;
            width: 90%;
            max-width: var(--hc-max-width);
            aspect-ratio: var(--hc-aspect);   /* 取代 height:50vw，任何寬度都維持比例 */
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: var(--hc-perspective);
            z-index: 0;
        }

        .hoho-carousel .hc-carousel {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
        }

        .hoho-carousel .hc-carousel-img {
            position: absolute;
            max-width: var(--hc-img-max-width);
            max-height: 100%;
            width: auto;
            height: auto;
            transition: transform var(--hc-transition-time) ease-in-out,
            opacity var(--hc-transition-time) ease-in-out;
            /* 依 PNG 實際輪廓投影，貼合圖內圓角、四角透明處不再露出陰影 */
            filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.5));
            transform-style: preserve-3d;
            will-change: transform, opacity;
        }

        /* ---- 標題圖（clamp 流體縮放，有上下限） ---- */
        .hoho-carousel .hc-title-top {
            display: block;
            margin: 1vw auto;
            width: clamp(120px, 50vw, 600px);
            height: auto;
            z-index: 999;
            pointer-events: none;
        }

        /* ---- 底部內容區 ---- */
        .hoho-carousel .hc-bottom-area {
            width: 90%;
            max-width: var(--hc-max-width);
            margin: 2vw auto 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            position: relative;
            z-index: 999;
        }

        .hoho-carousel .hc-title-bottom {
            width: clamp(120px, 65vw, 780px);
            height: auto;
        }

        .hoho-carousel .hc-bottom-buttons {
            margin-top: 1vw;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: clamp(8px, 2vw, 24px);
        }

        .hoho-carousel .hc-bottom-buttons button {
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 0;
            line-height: 0;
        }

        .hoho-carousel .hc-bottom-buttons button img {
            width: clamp(36px, 8vw, 75px);
            height: auto;
            opacity: 0.8;
            transition: opacity 0.3s;
        }

        .hoho-carousel .hc-bottom-buttons button img:hover {
            opacity: 1;
        }

        /* ============ 桌機 (>900px)：每張卡片站畫面 1/7 + 整組收在一屏內 ============ */
        @media (min-width: 901px) {
            .hoho-carousel {
                --hc-img-max-width: calc(100vw / 5.6);   /* 卡片放大（1/6.2 → ~1/5.6） */
            }

            /* PC：容器高 = min(寬×3750/8000, 視窗可用高)。內部改用 cqh 依「容器實際高」等比縮放，永不撐破也永不溢屏 */
            .hoho-carousel .hc-main {
                aspect-ratio: 8000 / 3750;
                max-height: calc(100vh - var(--hc-navbar));
                background-size: cover;
                justify-content: center;
                gap: clamp(16px, 4cqh, 48px);
                padding-block: clamp(8px, 2cqh, 24px);
                container-type: size;   /* 讓子元素的 cqh 對齊本容器高度 */
            }

            /* stage 撐開；透視已放平、卡片幾乎不放大，改 overflow: visible 讓卡片與投影底部完整不被裁 */
            /* ⚠️ HACK（非正規做法）：stage 加高並用負的 margin-top 往上頂、z-index 蓋過標題(999)，
               靠卡片 PNG「上緣半透明」的特性讓重疊看起來自然，藉此向標題區「借」高度換更大的卡片。
               正常情況各區塊不該互相重疊；若日後換成上緣不透明的素材，需移除此段。 */
            .hoho-carousel .hc-carousel-wrapper {
                aspect-ratio: auto;
                height: 110cqh;              /* HACK: 借高度放大卡片 */
                margin-top: -8cqh;          /* HACK: 往上頂，蓋過標題下緣 */
                width: 100%;
                overflow: visible;
                z-index: 1000;               /* HACK: 高於標題 .hc-title-top(999)，卡片才會蓋在上面 */
            }

            /* 高度上限放寬，讓卡片長到寬度上限(≥1/7)，不再被高度卡住 */
            .hoho-carousel .hc-carousel-img {
                max-height: 100%;
            }

            /* 標題：以「畫面寬」為基準，改由設計比例撐開，高度隨自然長寬比 */
            .hoho-carousel .hc-title-top {
                width: calc(100vw * 4.8 / 7);
                max-width: none;
                max-height: none;
                margin-top: 2rem;           /* 往上移（原 4rem） */
                flex-shrink: 0;               /* 不被壓縮 */
            }

            /* 讓標題蓋在卡片上方：<picture> 是 flex 子項，給它 z-index 才會疊在 stage(1000) 之上 */
            .hoho-carousel .hc-main > picture {
                position: relative;
                z-index: 1001;                /* 高於 .hc-carousel-wrapper(1000) → 標題覆蓋卡片 */
            }

            .hoho-carousel .hc-title-bottom {
                width: calc(100vw * 3 / 7);   /* 3/7 畫面寬 */
                max-width: none;
                max-height: none;
            }

            /* 按鈕群：往上移；間距用固定 px（與按鈕大小脫鉤 → 縮小時兩按鈕相對距離不變） */
            .hoho-carousel .hc-bottom-buttons {
                margin-top: -1.5cqh;   /* 往上移（可調） */
                gap: 24px;             /* 固定間距，不隨按鈕縮放改變 */
            }

            /* 按鈕縮小 25%（7cqh → 5.25cqh） */
            .hoho-carousel .hc-bottom-buttons button img {
                max-height: 5.25cqh;
                width: auto;
            }
        }

        /* ============ 平板 (600–900px) ============ */
        @media (max-width: 900px) {
            .hoho-carousel .hc-bottom-buttons button img {
                width: clamp(28px, 7vw, 56px);
            }
        }

        /* ============ 手機 (≤600px)：單欄堆疊 + 背景換手機圖 ============ */
        @media (max-width: 600px) {
            .hoho-carousel .hc-main {
                background-image: var(--hc-bg-mobile);
                background-size: cover;
                padding-bottom: 5vw;
                gap: 3rem;
            }

            .hoho-carousel .hc-carousel-wrapper {
                width: 96%;
            }

            .hoho-carousel .hc-title-top {
                width: clamp(120px, 80vw, 420px);   /* 與內文圖同寬 */
                margin-top: 1rem;                   /* 上方間距 */
            }

            .hoho-carousel .hc-title-bottom {
                width: clamp(120px, 80vw, 420px);
            }

            .hoho-carousel .hc-bottom-buttons button img {
                width: clamp(24px, 12vw, 48px);
            }
        }
    </style>

        <div class="hc-bottom-area">
            <picture>
                <source media="(max-width: 600px)" srcset="https://res.cloudinary.com/lmbtctmx/image/upload/v1783395161/260701Contents-mobile_mbnnk9.png" />
                <img src="https://res.cloudinary.com/lmbtctmx/image/upload/v1783330201/26070_content.png" class="hc-title-bottom" alt="Title Bottom" />

    <script>
        (function () {
            'use strict';

            // 以組件容器為 query 根，避免與 ShopLine 主題撞名
            const root = document.getElementById('hoho-carousel-root');
            if (!root || root.dataset.hcInit) return;   // 防止重複初始化
            root.dataset.hcInit = '1';

            const $ = (sel) => root.querySelector(sel);

            // ---- 集中設定：改這裡即可調整行為 ----
            const CONFIG = {
                visibleCount: 5,
                // 統一斷點（與 CSS media query 對齊）：>900 桌機、>600 平板、其餘手機
                breakpoints: { desktop: 900, tablet: 600 },
                configs: {
                    // 桌機：幾何依 stage 實際尺寸換算（container-relative），任何螢幕都吻合容器
                    desktop: { mode: 'relative', spreadRatio: 0.7, yRatio: 0.06, perspectiveRatio: 4.0, bounceRatio: 0.15, angleStep: Math.PI / 8, scaleStep: 0.08, skewAngle: 10, tiltFactor: 0.5, midGapFactor: 0.95 },
                    // 平板/手機：維持原固定 px（不變）
                    tablet:  { mode: 'absolute', radius: 300, angleStep: Math.PI / 6, scaleStep: 0.10, yAmplitude: 80, skewAngle: 8 },
                    mobile:  { mode: 'absolute', radius: 200, angleStep: Math.PI / 8, scaleStep: 0.08, yAmplitude: 60, skewAngle: 6 }
                }
            };

            // 讀取本組件容器上的 CSS 變數（非 documentElement，避免污染/被覆蓋）
            const cssVars = getComputedStyle(root);
            const transitionTime = parseInt(cssVars.getPropertyValue('--hc-transition-time')) || 600;
            const bounceDuration = parseInt(cssVars.getPropertyValue('--hc-bounce-duration')) || 400;
            const bouncePeakY = parseInt(cssVars.getPropertyValue('--hc-bounce-peak-y')) || -400;
            const bouncePeakZ = parseInt(cssVars.getPropertyValue('--hc-bounce-peak-z')) || 50;
            const bouncePeakScale = parseFloat(cssVars.getPropertyValue('--hc-bounce-peak-scale')) || 1.2;

            const stage = $('.hc-carousel-wrapper');
            const track = $('[data-hc-track]');
            const imgs = Array.from(track.children);
            const totalImgs = imgs.length;
            const visibleCount = CONFIG.visibleCount;

            let currentStartIndex = 0;
            let isAnimating = false;
            let isFirstRender = true;
            let resizeTimeout;
            let currentGeom = null;   // 本次解析出的幾何（供 bounceImage 取用）

            function getBreakpointConfig() {
                const w = window.innerWidth;
                if (w > CONFIG.breakpoints.desktop) return CONFIG.configs.desktop;
                if (w > CONFIG.breakpoints.tablet) return CONFIG.configs.tablet;
                return CONFIG.configs.mobile;
            }

            // 依斷點回傳「解析後的 px 幾何」：桌機由 stage 尺寸換算，平板/手機用固定值
            function getGeometry(sw, sh) {
                const c = getBreakpointConfig();
                if (c.mode === 'relative') {
                    return {
                        radius: sw * c.spreadRatio,
                        yAmplitude: sh * c.yRatio,
                        angleStep: c.angleStep,
                        scaleStep: c.scaleStep,
                        skewAngle: c.skewAngle,
                        tiltFactor: c.tiltFactor ?? 1,   // 0 = 完全平面（不影響間距）
                        midGapFactor: c.midGapFactor ?? 1,   // 中央↔旁邊間距倍率（<1 縮減）
                        perspective: sw * c.perspectiveRatio,
                        bouncePeakY: -sh * c.bounceRatio
                    };
                }
                return {
                    radius: c.radius,
                    yAmplitude: c.yAmplitude,
                    angleStep: c.angleStep,
                    scaleStep: c.scaleStep,
                    skewAngle: c.skewAngle,
                    tiltFactor: c.tiltFactor ?? 1,   // 平板/手機未設 → 1（維持原樣）
                    midGapFactor: c.midGapFactor ?? 1,   // 未設 → 1（維持原樣）
                    perspective: null,          // 回退 CSS 的 --hc-perspective
                    bouncePeakY: bouncePeakY     // CSS 變數(-400)，維持原樣
                };
            }

            // 專門縮減「中央↔旁邊」間距的函數：
            //   只縮第一段(中央→第一張)，其餘段(旁邊→外側)維持原距 → 外側整體跟著往內移、彼此間距不變。
            //   midGapFactor: 1 = 原始間距；<1 越小中央越靠近旁邊（例如 0.6）；>1 則拉開。
            function computeCardX(baseIndex, radius, angleStep, midGapFactor) {
                if (baseIndex === 0) return 0;
                const sign = Math.sign(baseIndex);
                const n = Math.abs(baseIndex);
                const firstGap = Math.sin(angleStep) * radius;              // 中央→第一張 的原始間距
                const scaledFirst = firstGap * midGapFactor;               // 縮減後的中央間距
                if (n === 1) return sign * scaledFirst;
                const outerFromFirst = Math.sin(n * angleStep) * radius - firstGap; // 第一張→本張 的原始距離
                return sign * (scaledFirst + outerFromFirst);
            }

            function updateCarousel() {
                const geom = getGeometry(stage.clientWidth, stage.clientHeight);
                currentGeom = geom;
                const { radius, angleStep, scaleStep, yAmplitude, skewAngle, tiltFactor, midGapFactor } = geom;

                // 桌機依 stage 換算 perspective；平板/手機清掉 inline、回退 CSS
                stage.style.perspective = geom.perspective != null ? geom.perspective + 'px' : '';

                imgs.forEach((img, i) => {
                    const relativeIndex = (i - currentStartIndex + totalImgs) % totalImgs;

                    if (relativeIndex < visibleCount) {
                        const baseIndex = relativeIndex - 2;
                        const angle = baseIndex * angleStep;
                        const x = computeCardX(baseIndex, radius, angleStep, midGapFactor);   // 間距（可用 midGapFactor 縮減中央段）
                        const z = -Math.abs(Math.cos(angle) * radius) * tiltFactor;  // 深度 → tilt 0 時為 0
                        const y = Math.cos(angle) * yAmplitude - yAmplitude;
                        const scale = 1 - Math.abs(baseIndex) * scaleStep;

                        let rotateY;
                        if (relativeIndex === 0) {
                            rotateY = -(-1 * angleStep) * (180 / Math.PI);
                        } else if (relativeIndex === visibleCount - 1) {
                            rotateY = -(1 * angleStep) * (180 / Math.PI);
                        } else {
                            rotateY = -angle * (180 / Math.PI);
                        }
                        rotateY *= tiltFactor;                            // tilt 0 時不旋轉（完全平面）

                        const skewYAngle = (baseIndex < 0 ? -skewAngle : baseIndex > 0 ? skewAngle : 0) * tiltFactor;

                        const baseTransform = `translateX(${x}px) translateY(${y}px) translateZ(${-z}px) scale(${scale}) rotateY(${rotateY}deg) skewY(${skewYAngle}deg)`;

                        img.dataset.baseTransform = baseTransform;
                        img.style.opacity = 1;
                        img.style.zIndex = 100 - Math.abs(baseIndex);
                        img.style.transform = baseTransform;
                    } else {
                        img.style.opacity = 0;
                        img.style.zIndex = 0;
                        img.style.transform = 'translateZ(-2000px) scale(0.5)';
                    }
                });

                if (!isFirstRender) {
                    setTimeout(() => {
                        const centerImg = imgs[(currentStartIndex + 2) % totalImgs];
                        bounceImage(centerImg);
                    }, transitionTime);
                }
            }

            function bounceImage(img) {
                let start = null;
                // 桌機為 stage 高度比例、平板/手機為 CSS 的 -400
                const peakY = (currentGeom && currentGeom.bouncePeakY != null) ? currentGeom.bouncePeakY : bouncePeakY;

                function animateBounce(timestamp) {
                    if (!start) start = timestamp;
                    const progress = Math.min((timestamp - start) / bounceDuration, 1);
                    const bounce = Math.sin(progress * Math.PI);

                    const translateY = bounce * peakY;
                    const translateZ = bounce * bouncePeakZ;
                    const scale = 1 + (bouncePeakScale - 1) * bounce;

                    img.style.transform = `${img.dataset.baseTransform} scale(${scale}) translateY(${translateY}px) translateZ(${translateZ}px)`;

                    if (progress < 1) {
                        requestAnimationFrame(animateBounce);
                    }
                }

                requestAnimationFrame(animateBounce);
            }

            const prevBtn = $('.hc-prev');
            const nextBtn = $('.hc-next');
            // 整段動畫時長：切換過場 + 彈跳；期間鎖住按鈕，避免中斷或連點兩次
            const lockDuration = transitionTime + bounceDuration;

            function lockButtons() {
                isAnimating = true;
                prevBtn.disabled = true;
                nextBtn.disabled = true;
                setTimeout(() => {
                    isAnimating = false;
                    prevBtn.disabled = false;
                    nextBtn.disabled = false;
                }, lockDuration);
            }

            function handleNext() {
                if (isAnimating) return;
                lockButtons();
                currentStartIndex = (currentStartIndex + 1) % totalImgs;
                isFirstRender = false;
                updateCarousel();
            }

            function handlePrev() {
                if (isAnimating) return;
                lockButtons();
                currentStartIndex = (currentStartIndex - 1 + totalImgs) % totalImgs;
                isFirstRender = false;
                updateCarousel();
            }

            nextBtn.addEventListener('click', handleNext);
            prevBtn.addEventListener('click', handlePrev);

            function handleResize() {
                if (resizeTimeout) clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(() => {
                    if (!isAnimating) updateCarousel();
                }, 100);
            }

            window.addEventListener('resize', handleResize);

            updateCarousel();
        })();
    </script>
</div>
