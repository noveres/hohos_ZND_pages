<style>
    :root {
        --transition-time: 600ms;
        --bounce-duration: 400ms;
        --bounce-peak-y: -400px;
        --bounce-peak-z: 50px;
        --bounce-peak-scale: 1.2;
    }

    .main-content {
        max-width: 100vw;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        position: relative;
        min-height: 125vh;
        height: 100vh;
        background-image: url('https://d6f39ee4.images-7y2.pages.dev/Pineapple/BG_02.png');
        background-size: 200% auto;
        background-position: center center;
        background-repeat: no-repeat;
    }

    .carousel-wrapper {
        position: relative;
        width: 90vw;
        max-width: 1200px;
        height: 50vw;
        max-height: 750px;
        margin: 0 auto;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 0;
    }

    .carousel {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
    }

    .carousel img {
        position: absolute;
        max-width: 100%;
        max-height: 87.5%;
        width: auto;
        height: auto;
        transition: transform var(--transition-time) ease-in-out, opacity var(--transition-time) ease-in-out;
        border-radius: 15px;
        box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        transform-style: preserve-3d;
        will-change: transform, opacity;
    }

    .carousel-wrapper button {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        background: transparent;
        border: none;
        cursor: pointer;
        z-index: 10;
        padding: 0;
    }

    #lastone {
        left: 4vw;
    }

    #nextone {
        right: 4vw;
    }

    .carousel-wrapper button img {
        width: 4vw;
        max-width: 48px;
        min-width: 28px;
        height: auto;
        opacity: 0.7;
        transition: opacity 0.3s;
    }

    .carousel-wrapper button img:hover {
        opacity: 1;
    }

    .title-img-left {
        position: absolute;
        top: 5vw;
        left: 2vw;
        max-width: 20vw;
        min-width: 60px;
        height: auto;
        z-index: 999;
        pointer-events: none;
    }

    .title-img-right {
        position: absolute;
        top: 1vw;
        right: 1vw;
        max-width: 35vw;
        min-width: 90px;
        height: auto;
        z-index: 999;
        pointer-events: none;
    }

    .bottom-area {
        width: 90vw;
        max-width: 1200px;
        margin: 2vw auto 0;
        text-align: center;
        position: relative;
        z-index: 999;
    }

    .title-img-bottom {
        max-width: 65vw;
        min-width: 120px;
        width: 100%;
        height: auto;
    }

    .bottom-buttons {
        margin-top: 1vw;
        display: flex;
        justify-content: center;
        gap: 2vw;
    }

    .bottom-buttons button {
        background: transparent;
        border: none;
        cursor: pointer;
        padding: 0;
    }

    .bottom-buttons button img {
        width: 25vw;
        max-width: 75px;
        min-width: 18px;
        height: auto;
        opacity: 0.8;
        transition: opacity 0.3s;
    }

    .bottom-buttons button img:hover {
        opacity: 1;
    }

    /* 手機版 - 合併兩個media queries */
    @media (max-width: 900px) {
        .main-content {
            max-width: 900px;
            width: 100%;
            height: auto;
            min-height: auto;
            background-size: 100% 100%;
        }
        
        #lastone {
            left: 0.5vw;
        }

        #nextone {
            right: 0.5vw;
        }
        
        .bottom-area {
            width: 90vw;
            max-width: 90vw;
            margin-top: 1vw;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .bottom-buttons {
            gap: 2vw;
            margin-top: 0.5vw;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .bottom-buttons button img {
            width: 4vw;
            max-width: 20px;
            min-width: 8px;
        }
    }

    @media (max-width: 500px) {
        .main-content {
            max-width: 500px;
        }
    }
</style>

<div class="main-content">

    <div class="carousel-wrapper">

            <img src="https://d6f39ee4.images-7y2.pages.dev/Pineapple/PA_F04.png" class="carousel-img" style="opacity: 0;" alt="Pineapple 4 Transparent" />

            <button id="lastone">
                <img src="https://d6f39ee4.images-7y2.pages.dev/Buttons/LWS_B.png" alt="Previous" />
            </button>
            <button id="nextone">
                <img src="https://d6f39ee4.images-7y2.pages.dev/Buttons/RWS_B.png" alt="Next" />
            </button>
        </div>
    </div>

    <script>
        // 快取DOM元素
        const track = document.getElementById('carousel');
        const imgs = Array.from(track.children);
        const totalImgs = imgs.length;
        const visibleCount = 5;
        
        // 狀態變數
        let currentStartIndex = 0;
        let isAnimating = false;
        let isFirstRender = true;
        let resizeTimeout;

        // 預計算的參數配置
        const configs = {
            desktop: { radius: 900, angleStep: Math.PI / 6, scaleStep: 0.08, yAmplitude: 100, skewAngle: 10 },
            tablet: { radius: 300, angleStep: Math.PI / 6, scaleStep: 0.1, yAmplitude: 80, skewAngle: 8 },
            mobile: { radius: 200, angleStep: Math.PI / 8, scaleStep: 0.08, yAmplitude: 60, skewAngle: 6 }
        };

        // 獲取當前配置
        function getConfig() {
            const windowWidth = window.innerWidth;
            if (windowWidth > 900) return configs.desktop;
            if (windowWidth > 600) return configs.tablet;
            return configs.mobile;
        }

        // 優化的輪播更新函數
        function updateCarousel() {
            const config = getConfig();
            const { radius, angleStep, scaleStep, yAmplitude, skewAngle } = config;

            imgs.forEach((img, i) => {
                const relativeIndex = (i - currentStartIndex + totalImgs) % totalImgs;

                if (relativeIndex < visibleCount) {
                    const baseIndex = relativeIndex - 2;
                    const angle = baseIndex * angleStep;
                    const x = Math.sin(angle) * radius;
                    const z = -Math.abs(Math.cos(angle) * radius);
                    const y = Math.cos(angle) * yAmplitude - yAmplitude;
                    const scale = 1 - Math.abs(baseIndex) * scaleStep;

                    let rotateY;
                    if (relativeIndex === 0) {
                        rotateY = -(-1 * angleStep) * (180 / Math.PI);
                    } else if (relativeIndex === visibleCount - 1) {
                        rotateY = -(1 * angleStep) * (180 / Math.PI);
                    } else {
                        rotateY = -angle * (180 / Math.PI);
                    }

                    const skewYAngle = baseIndex < 0 ? -skewAngle : baseIndex > 0 ? skewAngle : 0;

                    const baseTransform = `translateX(${x}px) translateY(${y}px) translateZ(${-z}px) scale(${scale}) rotateY(${rotateY}deg) skewY(${skewYAngle}deg)`;
                    
                    img.dataset.baseTransform = baseTransform;
                    img.style.opacity = 1;
                    img.style.zIndex = 100 - Math.abs(baseIndex);
                    img.style.transform = baseTransform;
                } else {
                    img.style.opacity = 0;
                    img.style.zIndex = 0;
                    img.style.transform = 'translateZ(-2000px) scale(0.5)';
                }
            });

            // 延遲觸發彈跳動畫
            if (!isFirstRender) {
                setTimeout(() => {
                    const centerImg = imgs[(currentStartIndex + 2) % totalImgs];
                    bounceImage(centerImg);
                }, parseInt(getComputedStyle(document.documentElement).getPropertyValue('--transition-time')));
            }
        }
    </script>
