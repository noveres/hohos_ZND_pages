<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Document</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
<div class="main-content">
  <img
          src="https://d6f39ee4.images-7y2.pages.dev/Buttons/Title01.png"
          class="title-img-left"
          alt="Title Left"
  />
  <img
          src="https://d6f39ee4.images-7y2.pages.dev/Buttons/Title02.png"
          class="title-img-right"
          alt="Title Right"
  />

  <div class="carousel-wrapper">
    <div class="carousel" id="carousel">
      <img
              src="https://d6f39ee4.images-7y2.pages.dev/Pineapple/PA_F01.png"
              class="carousel-img"
              alt="Pineapple 1"
      />
      <img
              src="https://d6f39ee4.images-7y2.pages.dev/Pineapple/PA_F02.png"
              class="carousel-img"
              alt="Pineapple 2"
      />
      <img
              src="https://d6f39ee4.images-7y2.pages.dev/Pineapple/PA_F03.png"
              class="carousel-img"
              alt="Pineapple 3"
      />
      <img
              src="https://d6f39ee4.images-7y2.pages.dev/Pineapple/PA_F04.png"
              class="carousel-img"
              alt="Pineapple 4"
      />
      <img
              src="https://d6f39ee4.images-7y2.pages.dev/Pineapple/PA_F05.png"
              class="carousel-img"
              alt="Pineapple 5"
      />

      <!-- 第二組透明 -->
      <img
              src="https://d6f39ee4.images-7y2.pages.dev/Pineapple/PA_F01.png"
              class="carousel-img"
              style="opacity: 0"
              alt="Pineapple 1 Transparent"
      />
      <img
              src="https://d6f39ee4.images-7y2.pages.dev/Pineapple/PA_F02.png"
              class="carousel-img"
              style="opacity: 0"
              alt="Pineapple 2 Transparent"
      />
      <img
              src="https://d6f39ee4.images-7y2.pages.dev/Pineapple/PA_F03.png"
              class="carousel-img"
              style="opacity: 0"
              alt="Pineapple 3 Transparent"
      />
      <img
              src="https://d6f39ee4.images-7y2.pages.dev/Pineapple/PA_F04.png"
              class="carousel-img"
              style="opacity: 0"
              alt="Pineapple 4 Transparent"
      />
      <img
              src="https://d6f39ee4.images-7y2.pages.dev/Pineapple/PA_F05.png"
              class="carousel-img"
              style="opacity: 0"
              alt="Pineapple 5 Transparent"
      />
    </div>
  </div>

  <div class="bottom-area">
    <img
            src="https://d6f39ee4.images-7y2.pages.dev/Buttons/Title03.png"
            class="title-img-bottom"
            alt="Title Bottom"
    />
    <div class="bottom-buttons">
      <button id="lastone">
        <img
                src="https://d6f39ee4.images-7y2.pages.dev/Buttons/LWS_B.png"
                alt="Previous"
        />
      </button>
      <button id="nextone">
        <img
                src="https://d6f39ee4.images-7y2.pages.dev/Buttons/RWS_B.png"
                alt="Next"
        />
      </button>
    </div>
  </div>

  <script src="./index.js"></script>
</div>
</body>
</html>
